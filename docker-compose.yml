services:
  postgres:
    image: postgres:16
    container_name: eugraphrag-postgres
    environment:
      POSTGRES_USER: eugraphrag
      POSTGRES_PASSWORD: eugraphrag
      POSTGRES_DB: eurlex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eugraphrag -d eurlex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
